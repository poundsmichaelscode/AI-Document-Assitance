services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: doc_assistant
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build:
      context: ../backend
    env_file:
      - ../backend/.env
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: ../backend
    env_file:
      - ../backend/.env
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ../frontend
    env_file:
      - ../frontend/.env
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
